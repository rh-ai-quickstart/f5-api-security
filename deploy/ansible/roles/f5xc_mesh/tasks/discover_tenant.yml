---
# Resolve f5xc_tenant_effective and f5xc_console_base.
# Optional: set f5xc_tenant in secrets.yml or export F5XC_TENANT to skip discovery.

- name: Set API headers for tenant discovery
  ansible.builtin.set_fact:
    f5xc_discovery_headers:
      Authorization: "APIToken {{ f5xc_api_token }}"

- name: Use explicit tenant from configuration
  ansible.builtin.set_fact:
    f5xc_tenant_effective: "{{ f5xc_tenant }}"
    f5xc_console_base: "https://{{ f5xc_tenant }}.console.ves.volterra.io"
  when:
    - f5xc_tenant | default('') | length > 0
    - f5xc_tenant != 'CHANGEME'

- name: Use F5XC_TENANT environment variable
  ansible.builtin.set_fact:
    f5xc_tenant_effective: "{{ lookup('env', 'F5XC_TENANT') }}"
    f5xc_console_base: "https://{{ lookup('env', 'F5XC_TENANT') }}.console.ves.volterra.io"
  when:
    - f5xc_tenant_effective is not defined
    - lookup('env', 'F5XC_TENANT') | default('') | length > 0

- name: Discover F5 XC tenant via API
  when: f5xc_tenant_effective is not defined
  block:
    - name: Probe global F5 XC console (follow redirects to tenant host)
      ansible.builtin.uri:
        url: "https://console.ves.volterra.io/api/register/namespaces/system/registrations"
        method: GET
        headers: "{{ f5xc_discovery_headers }}"
        follow_redirects: none
        status_code: [200, 302]
      register: f5xc_global_probe
      failed_when: false

    - name: Extract hostname from global console probe
      ansible.builtin.set_fact:
        f5xc_probe_hostname: "{{ f5xc_global_probe.url | urlsplit('hostname') }}"
      when: f5xc_global_probe.status == 200

    - name: Set tenant from redirected console hostname
      ansible.builtin.set_fact:
        f5xc_tenant_effective: "{{ f5xc_probe_hostname.split('.')[0] }}"
        f5xc_console_base: "https://{{ f5xc_probe_hostname.split('.')[0] }}.console.ves.volterra.io"
      when:
        - f5xc_probe_hostname is defined
        - f5xc_probe_hostname is match('^[a-z0-9][a-z0-9-]*\\.console\\.ves\\.volterra\\.io$')
        - f5xc_probe_hostname.split('.')[0] != 'console'

    - name: Decode JWT payload from API token
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import base64, json, sys
            parts = sys.argv[1].split(".")
            if len(parts) != 3:
              sys.exit(0)
            pad = "=" * (-len(parts[1]) % 4)
            payload = base64.urlsafe_b64decode(parts[1] + pad)
            sys.stdout.write(payload.decode("utf-8", errors="replace"))
          - "{{ f5xc_api_token }}"
      register: f5xc_jwt_decode
      changed_when: false
      failed_when: false
      when:
        - f5xc_tenant_effective is not defined
        - (f5xc_api_token.split('.')) | length == 3

    - name: Parse JWT tenant candidates
      ansible.builtin.set_fact:
        f5xc_jwt_payload: "{{ f5xc_jwt_decode.stdout | trim | from_json }}"
      when:
        - f5xc_tenant_effective is not defined
        - f5xc_jwt_decode.stdout | default('') | trim | length > 0
        - (f5xc_jwt_decode.stdout | trim) is match('^\\{')
      failed_when: false

    - name: Collect tenant candidates for subdomain probe
      ansible.builtin.set_fact:
        f5xc_tenant_candidates: >-
          {{
            [
              f5xc_jwt_payload.cname | default(''),
              f5xc_jwt_payload.tenant | default(''),
              f5xc_jwt_payload.org | default('')
            ]
            | reject('equalto', '')
            | reject('equalto', 'ves-io')
            | reject('match', '^ves-')
            | map('regex_replace', '\\.console\\.ves\\.volterra\\.io$', '')
            | list
            | unique
          }}
      when:
        - f5xc_tenant_effective is not defined
        - f5xc_jwt_payload is defined

    - name: Probe tenant candidate subdomains
      ansible.builtin.uri:
        url: "https://{{ item }}.console.ves.volterra.io/api/register/namespaces/system/registrations"
        method: GET
        headers: "{{ f5xc_discovery_headers }}"
        follow_redirects: none
        status_code: 200
        return_content: false
      register: f5xc_tenant_candidate_probe
      loop: "{{ f5xc_tenant_candidates | default([]) }}"
      when:
        - f5xc_tenant_effective is not defined
        - f5xc_tenant_candidates | default([]) | length > 0
      failed_when: false
      loop_control:
        label: "{{ item }}"

    - name: Select successful tenant candidate probe
      ansible.builtin.set_fact:
        f5xc_tenant_candidate_hit: >-
          {{
            f5xc_tenant_candidate_probe.results
            | default([])
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 200)
            | list
            | first
            | default({}, true)
          }}
      when:
        - f5xc_tenant_effective is not defined
        - f5xc_tenant_candidate_probe is not skipped
        - f5xc_tenant_candidate_probe.results | default([]) | selectattr('status', 'equalto', 200) | list | length > 0

    - name: Set tenant from successful candidate probe
      ansible.builtin.set_fact:
        f5xc_tenant_effective: "{{ f5xc_tenant_candidate_hit.item }}"
        f5xc_console_base: "https://{{ f5xc_tenant_candidate_hit.item }}.console.ves.volterra.io"
      when:
        - f5xc_tenant_effective is not defined
        - f5xc_tenant_candidate_hit.item | default('') | length > 0

- name: Assert F5 XC tenant was resolved
  ansible.builtin.assert:
    that:
      - f5xc_tenant_effective is defined
      - f5xc_tenant_effective | length > 0
    fail_msg: >-
      Could not determine F5 XC tenant automatically. Set f5xc_tenant in secrets.yml,
      export F5XC_TENANT, or verify the API token against your tenant console URL.

- name: Publish resolved tenant for other tasks
  ansible.builtin.set_fact:
    f5xc_tenant: "{{ f5xc_tenant_effective }}"

- name: Display resolved F5 XC tenant
  ansible.builtin.debug:
    msg: "Using F5 XC tenant '{{ f5xc_tenant_effective }}' ({{ f5xc_console_base }})"
