---
- name: "Check registration by site (attempt {{ poll_attempt }}/{{ poll_max_attempts }})"
  ansible.builtin.uri:
    url: "{{ f5xc_console_base }}/api/register/namespaces/system/registrations_by_site/{{ f5xc_cluster_name }}"
    method: GET
    headers: "{{ f5xc_api_headers }}"
    follow_redirects: none
    status_code: [200, 404]
  register: f5xc_site_poll

- name: Use registration from site lookup when present
  ansible.builtin.set_fact:
    f5xc_reg_name: "{{ (f5xc_site_poll.json['items'] | default([]))[0].name }}"
  when: (f5xc_site_poll.json['items'] | default([]) | length) > 0

- name: List PENDING registrations when site lookup is empty
  ansible.builtin.uri:
    url: "{{ f5xc_console_base }}/api/register/namespaces/system/listregistrationsbystate"
    method: POST
    headers: "{{ f5xc_api_headers }}"
    follow_redirects: none
    body_format: json
    body:
      namespace: system
      state: PENDING
    status_code: 200
  register: f5xc_pending_regs
  when: f5xc_reg_name | default('') | length == 0

- name: List NEW registrations when still not found
  ansible.builtin.uri:
    url: "{{ f5xc_console_base }}/api/register/namespaces/system/listregistrationsbystate"
    method: POST
    headers: "{{ f5xc_api_headers }}"
    follow_redirects: none
    body_format: json
    body:
      namespace: system
      state: NEW
    status_code: 200
  register: f5xc_new_regs
  when: f5xc_reg_name | default('') | length == 0

- name: Clear prior registration name lookup
  ansible.builtin.set_fact:
    f5xc_reg_name: ""
  when: f5xc_reg_name | default('') | length == 0

- name: Resolve registration name from PENDING list
  ansible.builtin.set_fact:
    f5xc_reg_name: "{{ item.name }}"
  vars:
    _registration_cluster_name: >-
      {{
        item.object.spec.gc_spec.passport.cluster_name | default(
          (((item.get_spec | default({})).gc_spec | default({})).passport | default({})).cluster_name | default('')
        )
      }}
  loop: "{{ f5xc_pending_regs.json['items'] | default([]) }}"
  when:
    - f5xc_reg_name | default('') | length == 0
    - f5xc_pending_regs is not skipped
    - _registration_cluster_name == f5xc_cluster_name
  loop_control:
    label: "{{ item.name | default('unknown') }}"

- name: Resolve registration name from NEW list
  ansible.builtin.set_fact:
    f5xc_reg_name: "{{ item.name }}"
  vars:
    _registration_cluster_name: >-
      {{
        item.object.spec.gc_spec.passport.cluster_name | default(
          (((item.get_spec | default({})).gc_spec | default({})).passport | default({})).cluster_name | default('')
        )
      }}
  loop: "{{ f5xc_new_regs.json['items'] | default([]) }}"
  when:
    - f5xc_reg_name | default('') | length == 0
    - f5xc_new_regs is not skipped
    - _registration_cluster_name == f5xc_cluster_name
  loop_control:
    label: "{{ item.name | default('unknown') }}"

- name: Wait before next registration poll
  ansible.builtin.pause:
    seconds: "{{ f5xc_registration_poll_interval | int }}"
  when:
    - f5xc_reg_name | default('') | length == 0
    - (poll_attempt | int) < (poll_max_attempts | int)

- name: Fail when registration not found within timeout
  ansible.builtin.fail:
    msg: >-
      No registration found for site '{{ f5xc_cluster_name }}' within {{ site_approval_timeout }}s.
      Confirm vp-manager is running, site token matches tenant, and f5xc_tenant is the console login subdomain.
  when:
    - f5xc_reg_name | default('') | length == 0
    - (poll_attempt | int) >= (poll_max_attempts | int)
